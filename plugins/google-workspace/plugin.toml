[plugin]
name = "google-workspace"
version = "0.1.0"
alias = "google"
description = "Google Workspace tools (Sheets, Calendar, Docs, Slides, Drive)"
plugin_type = "tools"

[auth]
type = "token"
check_field = "accessToken"

[config.clientId]
type = "string"
description = "Google OAuth Client ID"

[config.clientSecret]
type = "string"
description = "Google OAuth Client Secret"

[config.accessToken]
type = "string"
description = "OAuth access token (set by auth)"

[config.refreshToken]
type = "string"
description = "OAuth refresh token (set by auth)"

[config.tokenExpiry]
type = "number"
description = "Token expiry timestamp in ms (set by auth)"

[commands.auth]
description = "Authenticate with Google (OAuth2 PKCE)"
handler = "auth"
