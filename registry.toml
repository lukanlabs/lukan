# Lukan Plugin Registry
#
# Lists available plugins that can be installed remotely via:
#   lukan plugin install <name>
#
# For "bundled" plugins: single tarball, platform-independent (Node.js)
# For "binary" plugins: platform-specific tarballs (compiled Rust/C)

[meta]
version = 1
registry_url = "https://get.lukan.ai/registry.toml"

# ── Node.js plugins (platform-independent) ─────────────────────────────

[plugins.whatsapp]
description = "WhatsApp channel via Baileys bridge"
version = "0.1.0"
plugin_type = "channel"
source = "archive"

[plugins.whatsapp.assets.all]
url = "https://get.lukan.ai/plugins/lukan-plugin-whatsapp.tar.gz"

[plugins.google-workspace]
description = "Google Workspace tools (Sheets, Calendar, Docs, Drive)"
version = "0.1.0"
plugin_type = "tools"
source = "archive"

[plugins.google-workspace.assets.all]
url = "https://get.lukan.ai/plugins/lukan-plugin-google-workspace.tar.gz"

[plugins.gmail]
description = "Gmail tools (search, read, send, reply, modify)"
version = "0.1.0"
plugin_type = "tools"
source = "archive"

[plugins.gmail.assets.all]
url = "https://get.lukan.ai/plugins/lukan-plugin-gmail.tar.gz"

[plugins.docker-monitor]
description = "Monitor Docker container events (crashes, OOM, health changes)"
version = "0.1.0"
plugin_type = "channel"
source = "archive"

[plugins.docker-monitor.assets.all]
url = "https://get.lukan.ai/plugins/lukan-plugin-docker-monitor.tar.gz"

# ── Native plugins (platform-specific) ─────────────────────────────────

[plugins.whisper]
description = "Local audio transcription via whisper.cpp (GPU/CPU auto-detect)"
version = "0.1.0"
plugin_type = "channel"
source = "binary"

[plugins.whisper.assets.linux-x86_64]
url = "https://get.lukan.ai/plugins/lukan-plugin-whisper-linux-x86_64.tar.gz"
binary = "lukan-whisper"
