name: CI Desktop

on:
  push:
    branches: [development]
    paths:
      - 'crates/lukan-desktop/**'
      - 'desktop-client/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [master, development]
    paths:
      - 'crates/lukan-desktop/**'
      - 'desktop-client/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

concurrency:
  group: ci-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  desktop-check:
    name: Desktop Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-desktop-

      - name: Frontend build
        run: cd desktop-client && bun install --frozen-lockfile && bun run build

      - name: Clippy (desktop)
        run: cargo clippy -p lukan-desktop -- -D warnings

      - name: Build desktop
        run: cargo build --release -p lukan-desktop
