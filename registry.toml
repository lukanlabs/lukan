# Lukan Plugin Registry
#
# Lists available plugins that can be installed remotely via:
#   lukan plugin install <name>
#
# For "bundled" plugins: single tarball, platform-independent (Node.js)
# For "binary" plugins: platform-specific tarballs (compiled Rust/C)

[meta]
version = 1
registry_url = "https://get.lukan.ai/registry.toml"

# ── Node.js plugins (platform-independent) ─────────────────────────────

[plugins.whatsapp]
description = "WhatsApp channel via Baileys bridge"
version = "0.1.0"
plugin_type = "channel"
source = "archive"

[plugins.whatsapp.assets.all]
url = "https://get.lukan.ai/plugins/lukan-plugin-whatsapp.tar.gz"

