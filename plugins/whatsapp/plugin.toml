[plugin]
name = "whatsapp"
version = "0.1.0"
description = "WhatsApp channel via baileys connector"
plugin_type = "channel"
protocol_version = 1
alias = "wa"

[run]
command = "node"
args = ["bridge.js"]

[auth]
type = "qr"

# Config schema — rich fields for generic UI rendering
# Keys MUST match the camelCase keys used by bridge.js
[config.bridgeUrl]
type = "string"
label = "Bridge URL"
description = "Connector WebSocket URL"
format = "url"
group = "Connection"
order = 0
default = "ws://localhost:3001"

[config.prefix]
type = "string"
label = "Command Prefix"
description = "Only messages starting with this prefix will be processed"
group = "Connection"
order = 1

[config.whitelist]
type = "string[]"
label = "Phone Whitelist"
description = "Allowed phone numbers"
format = "phone"
group = "Access Control"
order = 0

[config.allowedGroups]
type = "string[]"
label = "Allowed Groups"
description = "Allowed group IDs"
options_command = "groups-json"
group = "Access Control"
order = 1

[config.transcriptionBackend]
type = "string"
label = "Transcription Backend"
description = "Audio transcription backend"
valid_values = ["openai", "local"]
default = "local"
group = "Audio"
order = 0

[config.whisperUrl]
type = "string"
label = "Whisper URL"
description = "Local Whisper server URL"
format = "url"
default = "http://localhost:8787"
group = "Audio"
order = 1
[config.whisperUrl.depends_on]
field = "transcriptionBackend"
values = ["local"]

[config.reminderAdvance]
type = "number"
label = "Reminder Advance"
description = "Minutes before reminder"
default = 15
group = "Reminders"
order = 0

[config.reminderChat]
type = "string"
label = "Reminder Chat"
description = "Chat ID for reminders"
group = "Reminders"
order = 1

[config.tools]
type = "string[]"
description = "Agent tools"
hidden = true
valid_values = [
  "Bash",
  "ReadFiles", "WriteFile", "EditFile",
  "Grep", "Glob",
  "WebFetch",
  "SheetsRead", "SheetsWrite", "SheetsCreate",
  "CalendarList", "CalendarCreate", "CalendarUpdate",
  "DocsRead", "DocsCreate", "DocsUpdate",
  "DriveList", "DriveDownload",
  "WhatsAppSend", "WhatsAppSendMedia", "WhatsAppListChats", "WhatsAppReadMessages", "WhatsAppSearchContacts",
]

# Security policy — generic protocol
[security]
default_tools = ["Grep", "Glob", "ReadFiles", "WebFetch", "WhatsAppSend", "WhatsAppSendMedia", "WhatsAppListChats", "WhatsAppReadMessages", "WhatsAppSearchContacts"]
include_memory = true
dir_restrictions = true
dangerous_tools = ["Bash", "WriteFile", "EditFile"]

[security.prompts]
dir_none = "prompt-dir-none.txt"
dir_allowed = "prompt-dir-allowed.txt"

# Custom commands handled by cli.js
[commands.auth]
description = "Authenticate WhatsApp by scanning QR code"
handler = "auth"

[commands.logout]
description = "Delete WhatsApp session"
handler = "logout"

[commands.groups]
description = "List available WhatsApp groups"
handler = "groups"

[commands.groups-json]
description = "List groups as JSON (for UI picker)"
handler = "groups-json"
