name: Release

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Frontend build
        run: cd desktop-client && bun install --frozen-lockfile && bun run build

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Build release
        run: make release

      - name: Generate release info
        id: release
        run: |
          VERSION="v0.2.0-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Generate changelog from commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges | grep -v "^- style:" | grep -v "^- Merge")
          else
            CHANGES=$(git log --pretty=format:"- %s" -20 --no-merges | grep -v "^- style:" | grep -v "^- Merge")
          fi

          # Write body to file (avoids quoting issues)
          cat > /tmp/release-body.md << ENDOFBODY
          ## Changes

          $CHANGES

          ## Assets
          - \`lukan-linux-amd64\` — CLI binary
          - \`lukan-desktop-linux-amd64\` — Desktop app binary
          - Plugin archives (\`.tar.gz\`)
          ENDOFBODY

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          name: ${{ steps.release.outputs.version }}
          prerelease: true
          body_path: /tmp/release-body.md
          files: |
            dist/lukan-linux-amd64
            dist/lukan-desktop-linux-amd64
            dist/checksums.txt
            dist/plugins/*.tar.gz
