name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── CLI + Relay binaries (Linux + macOS) ──────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            platform: linux-amd64
          - os: linux
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: darwin
            runner: macos-latest
            platform: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libasound2-dev

      - name: Install coreutils (macOS)
        if: matrix.os == 'darwin'
        run: |
          brew install coreutils
          ln -s $(which gsha256sum) /usr/local/bin/sha256sum

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-release

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Frontend build
        run: cd desktop-client && bun install --frozen-lockfile && bun run build

      - name: Clippy
        run: cargo clippy --workspace --exclude lukan-desktop -- -D warnings

      - name: Tests
        run: cargo test --workspace --exclude lukan-desktop

      - name: Clone whisper.cpp (for plugin build)
        run: git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git plugins/whisper/whisper.cpp

      - name: Build release
        run: make release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/

  # ── Desktop app (Tauri bundles: .deb, .AppImage, .dmg) ───────────────────
  desktop:
    name: Desktop / ${{ matrix.platform.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            os: ubuntu-22.04
            args: "--target x86_64-unknown-linux-gnu"
            rust_target: x86_64-unknown-linux-gnu

          - name: macOS ARM64
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.platform.rust_target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Frontend build
        run: cd desktop-client && bun install --frozen-lockfile && bun run build

      - name: Build CLI binary (for bundling)
        run: cargo build --release --target ${{ matrix.platform.rust_target }} -p lukan

      - name: Copy CLI to target/release for Tauri resource
        run: cp target/${{ matrix.platform.rust_target }}/release/lukan target/release/lukan

      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.MAC_CERT_BASE64 != ''
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$MAC_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/certificate.p12 -P "$MAC_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Build and bundle Tauri desktop app (signed)
        if: runner.os != 'macOS' || env.APPLE_SIGNING_IDENTITY != ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MAC_NOTARIZE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          projectPath: crates/lukan-desktop
          args: ${{ matrix.platform.args }}

      - name: Build and bundle Tauri desktop app (unsigned)
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY == ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          projectPath: crates/lukan-desktop
          args: ${{ matrix.platform.args }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build, desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts/

      - name: Merge artifacts
        run: |
          mkdir -p dist/plugins
          for dir in artifacts/release-*/; do
            cp "$dir"/lukan-*-* dist/ 2>/dev/null || true
            cp "$dir"/plugins/*.tar.gz dist/plugins/ 2>/dev/null || true
          done
          # Merge and deduplicate checksums by filename
          cat artifacts/release-*/checksums.txt | awk '!seen[$2]++' > dist/checksums.txt

      - name: Generate release info
        id: release
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges | grep -v "^- style:" | grep -v "^- Merge")
          else
            CHANGES=$(git log --pretty=format:"- %s" -20 --no-merges | grep -v "^- style:" | grep -v "^- Merge")
          fi

          cat > /tmp/release-body.md << ENDOFBODY
          ## Changes

          $CHANGES

          ## CLI Binaries
          - \`lukan-linux-amd64\` — CLI (Linux x86_64)
          - \`lukan-linux-arm64\` — CLI (Linux ARM64)
          - \`lukan-darwin-arm64\` — CLI (macOS Apple Silicon)
          - \`lukan-relay-*\` — Relay server

          ## Desktop App (includes CLI)
          - \`Lukan Desktop_*_amd64.deb\` — Linux x86_64 (.deb)
          - \`Lukan Desktop_*_amd64.AppImage\` — Linux x86_64 (.AppImage)
          - \`Lukan Desktop.app.tar.gz\` / \`.dmg\` — macOS Apple Silicon

          ## Install
          \`\`\`bash
          curl -sSf https://get.lukan.ai/install.sh | bash
          \`\`\`
          ENDOFBODY

      - name: Update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          name: ${{ steps.release.outputs.version }}
          body_path: /tmp/release-body.md
          files: |
            dist/lukan-*
            dist/checksums.txt
            dist/plugins/*.tar.gz
