[plugin]
name = "whatsapp"
version = "0.1.0"
description = "WhatsApp channel via baileys connector"
plugin_type = "channel"
protocol_version = 1
alias = "wa"

[run]
command = "node"
args = ["bridge.js"]

# Config schema — each field is editable via generic CLI
[config.whitelist]
type = "string[]"
description = "Allowed phone numbers"

[config.prefix]
type = "string"
description = "Command prefix"

[config.allowed_groups]
type = "string[]"
description = "Allowed group IDs"

[config.tools]
type = "string[]"
description = "Agent tools"
valid_values = [
  "Bash",
  "ReadFiles", "WriteFile", "EditFile",
  "Grep", "Glob",
  "WebFetch",
  "SheetsRead", "SheetsWrite", "SheetsCreate",
  "CalendarList", "CalendarCreate", "CalendarUpdate",
  "DocsRead", "DocsCreate", "DocsUpdate",
  "DriveList", "DriveDownload",
]

[config.bridge_url]
type = "string"
description = "Connector WebSocket URL"

[config.transcription_backend]
type = "string"
description = "Audio transcription backend: 'openai' (API) or 'local' (whisper.cpp server)"
valid_values = ["openai", "local"]

[config.whisper_url]
type = "string"
description = "Local Whisper server URL (used when transcription_backend = 'local')"

[config.reminder_advance]
type = "number"
description = "Minutes before reminder"

[config.reminder_chat]
type = "string"
description = "Chat ID for reminders"

# Security policy — generic protocol
[security]
default_tools = ["Grep", "Glob", "ReadFiles", "WebFetch"]
include_memory = true
dir_restrictions = true
dangerous_tools = ["Bash", "WriteFile", "EditFile"]

[security.prompts]
dir_none = "prompt-dir-none.txt"
dir_allowed = "prompt-dir-allowed.txt"

# Custom commands handled by cli.js
[commands.auth]
description = "Authenticate WhatsApp by scanning QR code"
handler = "auth"

[commands.logout]
description = "Delete WhatsApp session"
handler = "logout"

[commands.groups]
description = "List available WhatsApp groups"
handler = "groups"
