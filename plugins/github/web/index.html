<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GitHub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    background: #0a0a0a; color: #fafafa; font-size: 12px; line-height: 1.4;
    padding: 8px; overflow-y: auto;
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  body { scrollbar-width: none; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid rgba(60,60,60,0.4); margin-bottom: 8px; }
  .tabs button {
    padding: 5px 12px; font-size: 11px; font-weight: 500; color: #52525b;
    background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; transition: all 0.15s;
  }
  .tabs button.active { color: #fafafa; border-bottom-color: #fafafa; }
  .tabs button:hover { color: #a1a1aa; }
  .section { display: none; }
  .section.active { display: block; }
  .card {
    padding: 6px 10px; border-radius: 6px; margin-bottom: 4px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
    transition: background 0.15s; cursor: default;
  }
  .card:hover { background: rgba(255,255,255,0.04); }
  .badge {
    display: inline-flex; align-items: center; font-size: 10px;
    padding: 1px 6px; border-radius: 9999px; font-weight: 500;
  }
  .badge-open { background: rgba(74,222,128,0.1); color: #4ade80; }
  .badge-merged { background: rgba(139,92,246,0.1); color: #a78bfa; }
  .badge-closed { background: rgba(251,113,133,0.1); color: #fb7185; }
  .badge-draft { background: rgba(255,255,255,0.05); color: #71717a; }
  .badge-success { background: rgba(74,222,128,0.1); color: #4ade80; }
  .badge-failure { background: rgba(251,113,133,0.1); color: #fb7185; }
  .badge-pending { background: rgba(251,191,36,0.1); color: #fbbf24; }
  .meta { font-size: 10px; color: #52525b; }
  .title { font-size: 12px; font-weight: 500; color: #e4e4e7; word-wrap: break-word; overflow-wrap: break-word; }
  .mono { font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 11px; }
  .empty, .loading { text-align: center; padding: 20px 0; color: #52525b; font-size: 11px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .header h2 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #3f3f46; }
  .refresh-btn {
    padding: 2px 8px; border-radius: 4px; font-size: 10px;
    background: none; border: 1px solid rgba(255,255,255,0.08);
    color: #71717a; cursor: pointer;
  }
  .refresh-btn:hover { color: #fafafa; border-color: rgba(255,255,255,0.15); }
  .error-msg { padding: 6px 10px; border-radius: 6px; background: rgba(251,113,133,0.06); border: 1px solid rgba(251,113,133,0.15); color: #fb7185; font-size: 11px; margin-bottom: 8px; }
  .setup-msg { padding: 16px; text-align: center; color: #52525b; font-size: 11px; }
  .row { display: flex; align-items: center; gap: 6px; }
  .protected { font-size: 9px; padding: 0 4px; border-radius: 3px; background: rgba(251,191,36,0.1); color: #fbbf24; }

  /* Graph styles — compact like VSCode Source Control */
  .graph-info { flex: 1; min-width: 0; }
  .graph-msg { font-size: 11px; color: #d4d4d8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .graph-meta { font-size: 10px; color: #3f3f46; white-space: nowrap; }
  .graph-sha { font-family: "JetBrains Mono", monospace; font-size: 10px; color: #52525b; }
  .graph-branch-tag {
    display: inline-flex; font-size: 8px; padding: 0 4px; border-radius: 3px;
    font-weight: 600; margin-left: 4px; vertical-align: middle; line-height: 14px;
  }
  .graph-branch-tag.head { border-width: 1.5px; }
  .branch-filter { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .branch-chip {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1); background: none; color: #71717a;
    transition: all 0.15s;
  }
  .branch-chip.active { color: #fafafa; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
  .graph-branch-tag.remote { opacity: 0.85; font-style: italic; border-style: dashed !important; font-size: 7px; }
  .ahead-behind { font-size: 10px; color: #52525b; font-weight: 400; margin-left: 6px; letter-spacing: 0; text-transform: none; }
  .ahead-behind .ahead { color: #4ade80; }
  .ahead-behind .behind { color: #fb7185; }

  /* Working changes */
  .changes-section { margin-bottom: 10px; border-bottom: 1px solid rgba(60,60,60,0.3); padding-bottom: 8px; }
  .changes-section .header h2 { color: #52525b; }
  .change-file {
    display: flex; align-items: center; gap: 6px; padding: 3px 8px; border-radius: 4px;
    cursor: pointer; font-family: "JetBrains Mono", monospace; font-size: 10px;
    transition: background 0.12s;
  }
  .change-file:hover { background: rgba(255,255,255,0.05); }
  .change-badge {
    display: inline-block; width: 14px; text-align: center; font-size: 9px;
    font-weight: 700; border-radius: 2px; flex-shrink: 0; line-height: 14px;
  }
  .change-badge.M { color: #fbbf24; background: rgba(251,191,36,0.12); }
  .change-badge.A { color: #4ade80; background: rgba(74,222,128,0.12); }
  .change-badge.D { color: #fb7185; background: rgba(251,113,133,0.12); }
  .change-badge.U { color: #60a5fa; background: rgba(96,165,250,0.12); }
  .change-badge.R { color: #a78bfa; background: rgba(139,92,246,0.12); }
  .change-name { color: #a1a1aa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .change-dir { color: #3f3f46; font-size: 9px; }
  .changes-count { font-size: 10px; color: #52525b; font-weight: 400; margin-left: 4px; }
  .changes-empty { padding: 8px 0; text-align: center; color: #3f3f46; font-size: 10px; }

  /* Commit detail (expandable) */
  .commit-row { cursor: pointer; }
  .commit-row:hover .graph-msg { color: #fafafa; }
  .commit-detail {
    margin: 2px 0 6px; padding: 6px 10px; border-radius: 6px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
    font-size: 11px;
  }
  .commit-detail .full-msg { color: #a1a1aa; margin-bottom: 6px; white-space: pre-wrap; }
  .commit-files { list-style: none; }
  .commit-files li { padding: 2px 0; font-family: "JetBrains Mono", monospace; font-size: 10px; display: flex; gap: 6px; }
  .file-add { color: #4ade80; }
  .file-mod { color: #fbbf24; }
  .file-del { color: #fb7185; }
  .file-name { color: #a1a1aa; }
</style>
</head>
<body>
  <div id="setup" class="setup-msg" style="display:none">
    Configure token and repository in plugin settings
  </div>
  <div id="app" style="display:none">
    <div class="tabs">
      <button class="active" data-tab="git">Git</button>
      <button data-tab="graph" class="gh-tab" style="display:none">Graph</button>
      <button data-tab="branches" class="gh-tab" style="display:none">Branches</button>
      <button data-tab="prs" class="gh-tab" style="display:none">PRs</button>
      <button data-tab="actions" class="gh-tab" style="display:none">Actions</button>
    </div>
    <div id="error" class="error-msg" style="display:none"></div>

    <div id="tab-git" class="section active">
      <div class="header">
        <h2><span id="git-dir-label">Git</span> <span id="git-branch-label" style="color:#4ade80;font-size:10px;font-weight:500;text-transform:none;letter-spacing:0"></span></h2>
        <button class="refresh-btn" onclick="loadGitGraph(); loadChanges()">↻</button>
      </div>
      <!-- Staged changes -->
      <div id="staged-section" class="changes-section" style="display:none">
        <div class="header" style="margin-bottom:4px">
          <h2 style="color:#4ade80">Staged <span id="staged-count" class="changes-count"></span></h2>
        </div>
        <div id="staged-list"></div>
      </div>
      <!-- Working tree changes -->
      <div id="changes-section" class="changes-section" style="display:none">
        <div class="header" style="margin-bottom:4px">
          <h2>Changes <span id="changes-count" class="changes-count"></span></h2>
        </div>
        <div id="changes-list"></div>
      </div>
      <div id="git-graph"><div class="loading">Loading...</div></div>
    </div>
    <div id="tab-graph" class="section ">
      <div class="header"><h2>GitHub Graph</h2><button class="refresh-btn" onclick="loadGraph()">↻</button></div>
      <div id="branch-filters" class="branch-filter"></div>
      <div id="graph-container"><div class="loading">Loading...</div></div>
    </div>
    <div id="tab-branches" class="section">
      <div class="header"><h2>Branches</h2><button class="refresh-btn" onclick="loadBranches()">↻</button></div>
      <div id="branches-list"><div class="loading">Loading...</div></div>
    </div>
    <div id="tab-prs" class="section">
      <div class="header"><h2>Pull Requests</h2><button class="refresh-btn" onclick="loadPRs()">↻</button></div>
      <div id="prs-list"><div class="loading">Loading...</div></div>
    </div>
    <div id="tab-actions" class="section">
      <div class="header"><h2>Workflow Runs</h2><button class="refresh-btn" onclick="loadActions()">↻</button></div>
      <div id="actions-list"><div class="loading">Loading...</div></div>
    </div>
  </div>
<script>
let token = "", repo = "";
const API = "https://api.github.com";
const COLORS = ["#6366f1","#4ade80","#f59e0b","#fb7185","#8b5cf6","#06b6d4","#ec4899","#10b981","#ef4444","#3b82f6"];

/** Parse owner/repo from a git remote URL */
function parseGitHubRepo(url) {
  // Matches: git@github.com:owner/repo.git or https://github.com/owner/repo.git
  const m = url.match(/github\.com[:/]([^/\s]+\/[^\s.]+)/);
  return m ? m[1] : "";
}

/** Detect repo from git remote -v */
async function detectRepoFromRemote() {
  try {
    const output = await gitCmd("remote");
    if (!output) return "";
    // Parse remote -v output: "origin  git@github.com:owner/repo.git (fetch)"
    for (const line of output.trim().split("\n")) {
      if (!/[:@/]github\.com[:/]/.test(line)) continue;
      const parsed = parseGitHubRepo(line);
      if (parsed) return parsed;
    }
  } catch {}
  return "";
}

async function loadConfig() {
  try {
    const r = await fetch(window.location.origin + "/api/plugins/github/config");
    if (!r.ok) return false;
    const cfg = await r.json();
    token = cfg.token || "";
    repo = cfg.defaultRepo || "";
  } catch {}

  // Auto-detect repo from git remote if not configured
  if (!repo) {
    repo = await detectRepoFromRemote();
  }

  return !!(token && repo);
}

function gh(path) {
  return fetch(API + path, {
    headers: { Authorization: "Bearer " + token, Accept: "application/vnd.github+json" },
  });
}

function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return s + "s";
  if (s < 3600) return Math.floor(s/60) + "m";
  if (s < 86400) return Math.floor(s/3600) + "h";
  return Math.floor(s/86400) + "d";
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ── Tabs ──
document.querySelectorAll(".tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
    if (btn.dataset.tab === "git") { loadGitGraph(); loadChanges(); }
    if (btn.dataset.tab === "graph") loadGraph();
    if (btn.dataset.tab === "branches") loadBranches();
    if (btn.dataset.tab === "prs") loadPRs();
    if (btn.dataset.tab === "actions") loadActions();
  });
});

// ── Git (local) ──
let gitDir = "";

async function detectGitDir() {
  try {
    const r = await fetch(window.location.origin + "/api/cwd");
    if (r.ok) {
      const cwd = await r.json();
      setGitDir(cwd);
    }
  } catch {}
}

function setGitDir(dir) {
  gitDir = dir;
  defaultBranch = ""; // reset — will re-detect on next loadGitGraph
  const name = dir.split("/").pop() || "Git";
  document.getElementById("git-dir-label").textContent = name;
  // Re-detect repo when cwd changes (might be a different project)
  detectRepoFromRemote().then(r => {
    repo = r || "";
    showGitHubTabs(!!(token && repo));
  });
}

// Listen for cwd updates from parent (agent tabs + terminal cd)
window.addEventListener("message", (e) => {
  if (e.data && e.data.type === "cwd" && e.data.path) {
    hasPostMessageCwd = true;
    setGitDir(e.data.path);
    const gitTab = document.getElementById("tab-git");
    if (gitTab && gitTab.classList.contains("active")) { loadGitGraph(); loadChanges(); }
  }
});

// Poll cwd as fallback (only if we never received a postMessage cwd)
let hasPostMessageCwd = false;
setInterval(async () => {
  if (hasPostMessageCwd) return;
  try {
    const r = await fetch(window.location.origin + "/api/cwd");
    if (r.ok) {
      const cwd = await r.json();
      if (cwd && cwd !== gitDir) {
        setGitDir(cwd);
        const gitTab = document.getElementById("tab-git");
        if (gitTab && gitTab.classList.contains("active")) { loadGitGraph(); loadChanges(); }
      }
    }
  } catch {}
}, 3000);

// Git commands go through parent via postMessage (E2E encrypted in relay mode)
let _gitReqId = 0;
const _gitPending = new Map();
window.addEventListener("message", (e) => {
  if (e.data?.type === "git-result" && typeof e.data.reqId === "number") {
    const reqId = e.data.reqId;
    if (_gitPending.has(reqId)) {
      const callback = _gitPending.get(reqId);
      _gitPending.delete(reqId);
      callback({ stdout: e.data.stdout || "", ok: !!e.data.ok, error: e.data.error || "" });
    }
  }
});
async function gitCmd(cmd, args) {
  const reqId = ++_gitReqId;
  return new Promise((resolve, reject) => {
    _gitPending.set(reqId, (data) => {
      if (data.error) reject(new Error(data.error));
      else resolve(data.stdout);
    });
    window.parent.postMessage({ type: "git-cmd", reqId, cmd, dir: gitDir, args }, "*");
    setTimeout(() => {
      if (_gitPending.has(reqId)) { _gitPending.delete(reqId); reject(new Error("timeout")); }
    }, 15000);
  });
}

let currentBranch = "";
let defaultBranch = ""; // detected from origin (master, main, develop, etc.)

async function loadGitGraph() {
  const el = document.getElementById("git-graph");
  el.innerHTML = '<div class="loading">Loading...</div>';

  try {
    if (!gitDir) await detectGitDir();

    // Get current branch
    try { currentBranch = (await gitCmd("head")).trim(); } catch { currentBranch = ""; }
    const branchLabel = document.getElementById("git-branch-label");
    if (branchLabel) branchLabel.textContent = currentBranch ? "⎋ " + currentBranch : "";

    let output;
    try {
      output = await gitCmd("log-full");
    } catch (e) {
      el.innerHTML = '<div class="empty" style="padding:30px 0"><div style="margin-bottom:8px;color:#52525b">Not a git repository</div><div style="font-size:10px;color:#3f3f46">' + esc(gitDir) + '</div></div>';
      return;
    }
    if (!output.trim()) { el.innerHTML = '<div class="empty">No commits</div>'; return; }

    // Parse: SHA|Parents|Author|Date|Message|Refs
    const lines = output.trim().split("\n");
    const commits = [];
    const branchHeads = {}; // sha → [local ref names]
    const remoteHeads = {}; // sha → [remote ref names like "origin/master"]
    const allBranches = new Set();

    lines.forEach(line => {
      const parts = line.split("|");
      if (parts.length < 5) return;
      const sha = parts[0];
      const parents = parts[1].trim() ? parts[1].trim().split(" ") : [];
      const author = parts[2];
      const date = parts[3];
      const message = parts[4];
      const refs = parts[5] || "";

      commits.push({ sha, parents, author, date, message, refs });

      // Parse refs for branch labels
      if (refs.trim()) {
        const local = [];
        const remote = [];
        refs.split(",").map(r => r.trim()).filter(r => r && !r.startsWith("tag:")).forEach(r => {
          const clean = r.replace("HEAD -> ", "").trim();
          if (!clean) return;
          if (clean.startsWith("origin/")) {
            remote.push(clean);
          } else {
            local.push(clean);
            allBranches.add(clean);
          }
        });
        if (local.length) branchHeads[sha] = local;
        if (remote.length) {
          if (!branchHeads[sha]) branchHeads[sha] = [];
          // Store remote refs in separate map
          if (!remoteHeads[sha]) remoteHeads[sha] = [];
          remoteHeads[sha] = remote;
        }
        local.forEach(r => allBranches.add(r));
      }
    });

    // Detect default branch from GitHub API
    if (!defaultBranch && token && repo) {
      try {
        const r = await gh("/repos/" + repo);
        if (r.ok) {
          const data = await r.json();
          if (data.default_branch) defaultBranch = data.default_branch;
        }
      } catch {}
    }

    // Calculate ahead/behind from parsed commits
    if (currentBranch && branchLabel) {
      let headIdx = -1, originBranchIdx = -1, originMasterIdx = -1;
      const originBranch = "origin/" + currentBranch;
      commits.forEach((c, i) => {
        // Check local refs
        if ((branchHeads[c.sha] || []).includes(currentBranch) && headIdx < 0) headIdx = i;
        // Check remote refs
        const remotes = remoteHeads[c.sha] || [];
        if (remotes.includes(originBranch) && originBranchIdx < 0) originBranchIdx = i;
        if (defaultBranch && remotes.includes("origin/" + defaultBranch) && originMasterIdx < 0) originMasterIdx = i;
      });

      let abText = "";
      // Ahead vs origin/branch (unpushed)
      if (headIdx >= 0 && originBranchIdx >= 0 && originBranchIdx > headIdx) {
        abText += ' <span class="ahead-behind"><span class="ahead">↑' + (originBranchIdx - headIdx) + ' unpushed</span></span>';
      }
      // Ahead vs origin/master (for PR)
      if (headIdx >= 0 && originMasterIdx >= 0 && originMasterIdx > headIdx && defaultBranch && currentBranch !== defaultBranch) {
        abText += ' <span class="ahead-behind"><span style="color:#60a5fa">+' + (originMasterIdx - headIdx) + ' vs ' + esc(defaultBranch) + '</span></span>';
      }
      if (abText) branchLabel.innerHTML = "⎋ " + esc(currentBranch) + abText;
    }

    // Assign lanes: map each commit to a column based on branch
    const branchLane = {};
    let nextLane = 0;
    [...allBranches].forEach(b => { branchLane[b] = nextLane++; });

    // Assign each commit a lane
    const commitLane = {};
    const shaToIdx = {};
    commits.forEach((c, i) => {
      shaToIdx[c.sha] = i;
      // Use the first ref's lane, or parent's lane, or next available
      if (branchHeads[c.sha]) {
        commitLane[c.sha] = branchLane[branchHeads[c.sha][0]] || 0;
      } else if (c.parents.length && commitLane[c.parents[0]] !== undefined) {
        commitLane[c.sha] = commitLane[c.parents[0]];
      }
    });

    // Second pass for commits without lanes
    commits.forEach(c => {
      if (commitLane[c.sha] === undefined) {
        if (c.parents.length && commitLane[c.parents[0]] !== undefined) {
          commitLane[c.sha] = commitLane[c.parents[0]];
        } else {
          commitLane[c.sha] = 0;
        }
      }
    });

    const numLanes = Math.max(nextLane, 1);
    const ROW_H = 18;
    const COL_W = 2;
    const PAD = 1;
    const DOT_R = 1;
    const railW = PAD + numLanes * COL_W + 1;
    const totalH = commits.length * ROW_H;

    // SVG
    let svg = `<svg width="${railW}" height="${totalH}" style="position:absolute;top:0;left:0">`;

    // Lines from each commit to its parents
    commits.forEach((c, i) => {
      const y = i * ROW_H + ROW_H / 2;
      const lane = commitLane[c.sha] || 0;
      const x = PAD + lane * COL_W + COL_W / 2;
      const color = COLORS[lane % COLORS.length];

      c.parents.forEach(psha => {
        const pIdx = shaToIdx[psha];
        if (pIdx !== undefined) {
          const py = pIdx * ROW_H + ROW_H / 2;
          const pLane = commitLane[psha] || 0;
          const px = PAD + pLane * COL_W + COL_W / 2;

          if (lane === pLane) {
            svg += `<line x1="${x}" y1="${y}" x2="${px}" y2="${py}" stroke="${color}" stroke-width="0.5" opacity="0.5"/>`;
          } else {
            svg += `<path d="M${x},${y} C${x},${y+4} ${px},${py-4} ${px},${py}" stroke="${COLORS[pLane % COLORS.length]}" stroke-width="0.5" fill="none" opacity="0.4"/>`;
          }
        }
      });

      // Dot
      svg += `<circle cx="${x}" cy="${y}" r="${DOT_R}" fill="${color}"/>`;
    });
    svg += "</svg>";


    // Rows
    let html = `<div style="position:relative">`;
    html += svg;
    html += `<div style="margin-left:${railW}px">`;
    commits.forEach((c, i) => {
      // Only show badge for current branch and origin/master|main
      let tags = "";
      const locals = branchHeads[c.sha] || [];
      if (locals.includes(currentBranch)) {
        const lane = branchLane[currentBranch] || 0;
        const col = COLORS[lane % COLORS.length];
        tags += `<span class="graph-branch-tag head" style="background:${col}30;color:${col};border:1px solid ${col}80">${esc(currentBranch)}</span>`;
      }
      const remotes = remoteHeads[c.sha] || [];
      const originDefault = defaultBranch ? "origin/" + defaultBranch : "";
      if (originDefault && remotes.includes(originDefault)) {
        tags += `<span class="graph-branch-tag remote" style="background:rgba(251,191,36,0.1);color:#fbbf24;border:1px dashed rgba(251,191,36,0.3)">${esc(originDefault)}</span>`;
      }

      html += `<div class="commit-row" data-sha="${c.sha}" data-source="git" style="height:${ROW_H}px;display:flex;align-items:center">
        <div class="graph-info" style="display:flex;align-items:center;gap:4px;min-width:0">
          <div class="graph-msg" style="flex:1">${esc(c.message)}</div>
          ${tags ? '<div style="flex-shrink:0;display:flex;gap:2px">' + tags + '</div>' : ''}
        </div>
        <div class="graph-meta" style="flex-shrink:0;margin-left:6px"><span class="graph-sha">${c.sha.slice(0,7)}</span> ${timeAgo(c.date)}</div>
      </div>
      <div class="commit-detail" id="detail-${c.sha}" style="display:none"></div>`;
    });
    html += "</div></div>";
    el.innerHTML = html;
    attachCommitClickHandlers(el);

  } catch (e) {
    // Not a git repo or other git error — show inline, not as error banner
    const el = document.getElementById("git-graph");
    el.innerHTML = '<div class="empty" style="padding:30px 0"><div style="color:#52525b">Not a git repository</div><div style="font-size:10px;color:#3f3f46;margin-top:4px">' + esc(gitDir) + '</div></div>';
  }
}

// ── Working tree changes (staged + unstaged) ──

function parseStatusLine(line) {
  line = line.replace(/\r$/, "");
  if (line.length < 4) return null;
  const idx = line[0], wt = line[1];
  let path = line.substring(2).trimStart();
  if (path.startsWith('"') && path.endsWith('"')) path = path.slice(1, -1);
  const arrow = path.indexOf(" -> ");
  if (arrow >= 0) {
    path = path.slice(arrow + 4);
    if (path.startsWith('"') && path.endsWith('"')) path = path.slice(1, -1);
  }
  const lastSlash = path.lastIndexOf("/");
  const dir = lastSlash >= 0 ? path.slice(0, lastSlash + 1) : "";
  const name = lastSlash >= 0 ? path.slice(lastSlash + 1) : path;
  return { idx, wt, path, dir, name };
}

function statusLetter(ch) {
  if (ch === "M") return "M";
  if (ch === "A") return "A";
  if (ch === "D") return "D";
  if (ch === "R") return "R";
  if (ch === "C") return "C";
  return "M";
}

function renderFileList(container, files) {
  container.innerHTML = "";
  files.forEach(f => {
    const div = document.createElement("div");
    div.className = "change-file";
    div.innerHTML = '<span class="change-badge ' + f.status + '">' + f.status + '</span>'
      + '<span class="change-name">' + (f.dir ? '<span class="change-dir">' + esc(f.dir) + '</span>' : '') + esc(f.name) + '</span>';
    div.addEventListener("click", () => {
      window.parent.postMessage({ type: "open-diff-working", file: f.path, dir: gitDir }, "*");
    });
    container.appendChild(div);
  });
}

function parseNameStatus(output) {
  // Parse "X\tpath" lines from git diff --name-status
  return output.trim().split("\n").filter(l => l.trim()).map(line => {
    const tab = line.indexOf("\t");
    if (tab < 0) return null;
    const status = line.slice(0, tab).trim();
    let path = line.slice(tab + 1).trim();
    if (path.startsWith('"') && path.endsWith('"')) path = path.slice(1, -1);
    const lastSlash = path.lastIndexOf("/");
    return {
      status: status[0] || "M",
      path,
      dir: lastSlash >= 0 ? path.slice(0, lastSlash + 1) : "",
      name: lastSlash >= 0 ? path.slice(lastSlash + 1) : path,
    };
  }).filter(f => f && f.path);
}

async function loadChanges() {
  const stagedSection = document.getElementById("staged-section");
  const stagedList = document.getElementById("staged-list");
  const stagedCount = document.getElementById("staged-count");
  const changesSection = document.getElementById("changes-section");
  const changesList = document.getElementById("changes-list");
  const changesCount = document.getElementById("changes-count");

  try {
    if (!gitDir) await detectGitDir();

    // Use separate commands — no ambiguous porcelain parsing
    const [stagedOut, unstagedOut, untrackedOut] = await Promise.all([
      gitCmd("diff-staged").catch(() => ""),
      gitCmd("diff-unstaged").catch(() => ""),
      gitCmd("untracked").catch(() => ""),
    ]);

    const staged = parseNameStatus(stagedOut);
    const unstaged = parseNameStatus(unstagedOut);

    // Untracked files (just paths, all status "U")
    if (untrackedOut.trim()) {
      untrackedOut.trim().split("\n").forEach(line => {
        const path = line.trim();
        if (!path) return;
        const lastSlash = path.lastIndexOf("/");
        unstaged.push({
          status: "U", path,
          dir: lastSlash >= 0 ? path.slice(0, lastSlash + 1) : "",
          name: lastSlash >= 0 ? path.slice(lastSlash + 1) : path,
        });
      });
    }

    // Staged section
    if (staged.length > 0) {
      stagedSection.style.display = "";
      stagedCount.textContent = "(" + staged.length + ")";
      renderFileList(stagedList, staged);
    } else {
      stagedSection.style.display = "none";
    }

    // Unstaged section
    if (unstaged.length > 0) {
      changesSection.style.display = "";
      changesCount.textContent = "(" + unstaged.length + ")";
      renderFileList(changesList, unstaged);
    } else {
      changesSection.style.display = "none";
    }

  } catch {
    stagedSection.style.display = "none";
    changesSection.style.display = "none";
  }
}

// ── Commit detail (click to expand) ──
function attachCommitClickHandlers(container) {
  container.querySelectorAll(".commit-row").forEach(row => {
    row.addEventListener("click", async () => {
      const sha = row.dataset.sha;
      const source = row.dataset.source; // "git" or "github"
      const detail = document.getElementById("detail-" + sha);
      if (!detail) return;

      // Toggle
      if (detail.style.display !== "none") {
        detail.style.display = "none";
        return;
      }

      detail.innerHTML = '<span class="meta">Loading...</span>';
      detail.style.display = "";

      try {
        if (source === "git") {
          // Local git show
          const r = await fetch(window.location.origin + "/api/git?cmd=show&dir=" + encodeURIComponent(gitDir) + "&args=" + encodeURIComponent(sha));
          const data = await r.json();
          if (!data.ok) throw new Error(data.stderr);
          const out = data.stdout;

          // Parse numstat: commit message, then blank line, then "adds\tdels\tfile" lines
          const parts = out.split("\n");
          let msgLines = [];
          let fileLines = [];
          let inFiles = false;
          for (const line of parts) {
            if (!inFiles && line.match(/^\d+\t\d+\t/)) {
              inFiles = true;
            }
            if (inFiles) fileLines.push(line);
            else msgLines.push(line);
          }

          const msg = msgLines.join("\n").trim();
          const filesHtml = fileLines.filter(l => l.match(/^\d+\t\d+\t/)).map(l => {
            const [adds, dels, ...rest] = l.split("\t");
            const name = rest.join("\t").trim();
            if (!name) return "";
            return `<li data-diff-file="${esc(name)}" data-diff-sha="${sha}" style="cursor:pointer" onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background=''"><span class="file-add">+${adds}</span><span class="file-del">-${dels}</span><span class="file-name">${esc(name)}</span></li>`;
          }).join("");

          detail.innerHTML = `<div class="full-msg">${esc(msg)}</div><ul class="commit-files">${filesHtml || '<li class="meta">No file changes</li>'}</ul>`;
          // Attach click handlers for file diff
          detail.querySelectorAll("[data-diff-file]").forEach(li => {
            li.addEventListener("click", (e) => {
              e.stopPropagation();
              window.parent.postMessage({ type: "open-diff", sha: li.dataset.diffSha, file: li.dataset.diffFile, dir: gitDir }, "*");
            });
          });

        } else {
          // GitHub API
          const r = await gh("/repos/" + repo + "/commits/" + sha);
          if (!r.ok) throw new Error(r.status);
          const data = await r.json();
          const msg = data.commit.message;
          const files = data.files || [];
          const filesHtml = files.map(f => {
            const status = f.status === "added" ? "file-add" : f.status === "removed" ? "file-del" : "file-mod";
            return `<li data-diff-file="${esc(f.filename)}" data-diff-sha="${sha}" style="cursor:pointer" onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background=''"><span class="file-add">+${f.additions}</span><span class="file-del">-${f.deletions}</span><span class="${status}">${esc(f.filename)}</span></li>`;
          }).join("");

          detail.innerHTML = `<div class="full-msg">${esc(msg)}</div><ul class="commit-files">${filesHtml || '<li class="meta">No file changes</li>'}</ul>`;
          detail.querySelectorAll("[data-diff-file]").forEach(li => {
            li.addEventListener("click", (e) => {
              e.stopPropagation();
              window.parent.postMessage({ type: "open-diff", sha: li.dataset.diffSha, file: li.dataset.diffFile, dir: gitDir }, "*");
            });
          });
        }
      } catch (e) {
        detail.innerHTML = `<span class="meta">Error: ${esc(e.message)}</span>`;
      }
    });
  });
}

// ── Graph ──
let graphBranches = [];
let graphData = {};
let selectedBranches = new Set();

async function loadGraph() {
  const container = document.getElementById("graph-container");
  const filters = document.getElementById("branch-filters");
  container.innerHTML = '<div class="loading">Loading...</div>';

  try {
    // Fetch branches
    const br = await gh("/repos/" + repo + "/branches?per_page=15");
    if (!br.ok) throw new Error(br.status);
    graphBranches = await br.json();

    // Default: show first 5 branches
    if (selectedBranches.size === 0) {
      graphBranches.slice(0, 5).forEach(b => selectedBranches.add(b.name));
    }

    // Render branch filter chips
    filters.innerHTML = graphBranches.map((b, i) =>
      `<button class="branch-chip ${selectedBranches.has(b.name) ? 'active' : ''}" data-branch="${esc(b.name)}" style="${selectedBranches.has(b.name) ? 'border-color:' + COLORS[i % COLORS.length] + ';color:' + COLORS[i % COLORS.length] : ''}">${esc(b.name)}</button>`
    ).join("");

    filters.querySelectorAll(".branch-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        const name = chip.dataset.branch;
        if (selectedBranches.has(name)) selectedBranches.delete(name);
        else selectedBranches.add(name);
        loadGraph();
      });
    });

    // Fetch commits for selected branches
    const activeBranches = graphBranches.filter(b => selectedBranches.has(b.name));
    const fetches = activeBranches.map(b =>
      gh("/repos/" + repo + "/commits?sha=" + encodeURIComponent(b.name) + "&per_page=15")
        .then(r => r.ok ? r.json() : [])
    );
    const results = await Promise.all(fetches);

    // Build unified commit list
    const commitMap = new Map(); // sha → { commit, branches: Set }
    activeBranches.forEach((b, i) => {
      (results[i] || []).forEach(c => {
        if (commitMap.has(c.sha)) {
          commitMap.get(c.sha).branches.add(b.name);
        } else {
          commitMap.set(c.sha, {
            sha: c.sha,
            message: c.commit.message.split("\n")[0],
            author: c.commit.author.name || c.author?.login || "?",
            date: c.commit.author.date,
            parents: c.parents.map(p => p.sha),
            branches: new Set([b.name]),
          });
        }
      });
    });

    // Sort by date descending
    const commits = [...commitMap.values()].sort((a, b) => new Date(b.date) - new Date(a.date));

    if (!commits.length) {
      container.innerHTML = '<div class="empty">No commits</div>';
      return;
    }

    // Assign columns to branches
    const branchOrder = activeBranches.map(b => b.name);
    const branchCol = {};
    branchOrder.forEach((name, i) => { branchCol[name] = i; });

    // Find which column each commit goes in (leftmost branch)
    function commitCol(c) {
      let min = 999;
      c.branches.forEach(b => { if (branchCol[b] !== undefined && branchCol[b] < min) min = branchCol[b]; });
      return min === 999 ? 0 : min;
    }

    const ROW_H = 28;
    const COL_W = 14;
    const DOT_R = 3;
    const PAD_LEFT = 6;
    const numCols = branchOrder.length;
    const railWidth = PAD_LEFT + numCols * COL_W + 10;
    const totalH = commits.length * ROW_H;

    // Build SVG for the rail
    let svg = `<svg width="${railWidth}" height="${totalH}" style="position:absolute;top:0;left:0">`;

    // Draw branch lines
    const branchLastY = {};
    commits.forEach((c, row) => {
      const y = row * ROW_H + ROW_H / 2;
      c.branches.forEach(b => {
        const col = branchCol[b];
        if (col === undefined) return;
        const x = PAD_LEFT + col * COL_W + COL_W / 2;
        const color = COLORS[col % COLORS.length];

        if (branchLastY[b] !== undefined) {
          svg += `<line x1="${x}" y1="${branchLastY[b]}" x2="${x}" y2="${y}" stroke="${color}" stroke-width="1.5" opacity="0.4"/>`;
        }
        branchLastY[b] = y;
      });
    });

    // Draw dots and merge lines
    commits.forEach((c, row) => {
      const y = row * ROW_H + ROW_H / 2;
      const col = commitCol(c);
      const x = PAD_LEFT + col * COL_W + COL_W / 2;
      const color = COLORS[col % COLORS.length];

      // Merge lines to parents in different columns
      c.parents.forEach(psha => {
        const pIdx = commits.findIndex(pc => pc.sha === psha);
        if (pIdx >= 0) {
          const parent = commits[pIdx];
          const pCol = commitCol(parent);
          if (pCol !== col) {
            const py = pIdx * ROW_H + ROW_H / 2;
            const px = PAD_LEFT + pCol * COL_W + COL_W / 2;
            svg += `<path d="M${x},${y} C${x},${y + 14} ${px},${py - 14} ${px},${py}" stroke="${COLORS[pCol % COLORS.length]}" stroke-width="1.5" fill="none" opacity="0.3"/>`;
          }
        }
      });

      // Dot
      svg += `<circle cx="${x}" cy="${y}" r="${DOT_R}" fill="${color}"/>`;
    });

    svg += "</svg>";

    // Build rows
    let html = `<div style="position:relative">`;
    html += svg;
    html += `<div style="margin-left:${railWidth}px">`;

    // Branch labels for heads
    const branchHeads = {};
    activeBranches.forEach((b, i) => {
      const headSha = b.commit.sha;
      if (!branchHeads[headSha]) branchHeads[headSha] = [];
      branchHeads[headSha].push({ name: b.name, color: COLORS[i % COLORS.length] });
    });

    commits.forEach((c, row) => {
      const tags = (branchHeads[c.sha] || []).map(t =>
        `<span class="graph-branch-tag" style="background:${t.color}20;color:${t.color};border:1px solid ${t.color}40">${esc(t.name)}</span>`
      ).join("");

      html += `<div class="commit-row" data-sha="${c.sha}" data-source="github" style="height:${ROW_H}px">
        <div class="graph-info">
          <div class="graph-msg">${esc(c.message)}${tags}</div>
          <div class="graph-meta"><span class="graph-sha">${c.sha.slice(0,7)}</span> · ${esc(c.author)} · ${timeAgo(c.date)}</div>
        </div>
      </div>
      <div class="commit-detail" id="detail-${c.sha}" style="display:none"></div>`;
    });

    html += "</div></div>";
    container.innerHTML = html;
    attachCommitClickHandlers(container);

  } catch (e) { showError("Graph: " + e.message); }
}

// ── Branches ──
async function loadBranches() {
  const el = document.getElementById("branches-list");
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const r = await gh("/repos/" + repo + "/branches?per_page=30");
    if (!r.ok) throw new Error(r.status);
    const branches = await r.json();
    if (!branches.length) { el.innerHTML = '<div class="empty">No branches</div>'; return; }
    el.innerHTML = branches.map(b =>
      `<div class="card row" style="justify-content:space-between">
        <div class="row"><span class="mono">${esc(b.name)}</span>${b.protected ? '<span class="protected">protected</span>' : ''}</div>
        <span class="meta">${b.commit.sha.slice(0,7)}</span>
      </div>`
    ).join("");
  } catch (e) { showError("Branches: " + e.message); }
}

// ── PRs ──
async function loadPRs() {
  const el = document.getElementById("prs-list");
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const r = await gh("/repos/" + repo + "/pulls?state=all&per_page=20&sort=updated&direction=desc");
    if (!r.ok) throw new Error(r.status);
    const prs = await r.json();
    if (!prs.length) { el.innerHTML = '<div class="empty">No pull requests</div>'; return; }
    el.innerHTML = prs.map(pr => {
      let badge = "badge-open", label = "Open";
      if (pr.merged_at) { badge = "badge-merged"; label = "Merged"; }
      else if (pr.state === "closed") { badge = "badge-closed"; label = "Closed"; }
      else if (pr.draft) { badge = "badge-draft"; label = "Draft"; }
      return `<div class="card">
        <div class="row" style="gap:6px;margin-bottom:2px">
          <span class="badge ${badge}">${label}</span>
          <span class="title">#${pr.number} ${esc(pr.title)}</span>
        </div>
        <div class="meta">${esc(pr.user.login)} · ${esc(pr.head.ref)} → ${esc(pr.base.ref)} · ${timeAgo(pr.updated_at)}</div>
      </div>`;
    }).join("");
  } catch (e) { showError("PRs: " + e.message); }
}

// ── Actions ──
async function loadActions() {
  const el = document.getElementById("actions-list");
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const r = await gh("/repos/" + repo + "/actions/runs?per_page=20");
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const runs = data.workflow_runs || [];
    if (!runs.length) { el.innerHTML = '<div class="empty">No workflow runs</div>'; return; }
    el.innerHTML = runs.map(run => {
      let badge = "badge-pending", label = run.status;
      if (run.conclusion === "success") { badge = "badge-success"; label = "✓"; }
      else if (run.conclusion === "failure") { badge = "badge-failure"; label = "✗"; }
      else if (run.status === "in_progress") { label = "..."; }
      else if (run.status === "queued") { label = "⏳"; }
      return `<div class="card">
        <div class="row" style="gap:6px;margin-bottom:2px">
          <span class="badge ${badge}">${label}</span>
          <span class="title">${esc(run.name)}</span>
        </div>
        <div class="meta">${esc(run.head_branch)} · ${run.head_sha.slice(0,7)} · ${timeAgo(run.updated_at)}</div>
      </div>`;
    }).join("");
  } catch (e) { showError("Actions: " + e.message); }
}

function showError(msg) {
  const el = document.getElementById("error");
  el.textContent = msg;
  el.style.display = "";
  setTimeout(() => { el.style.display = "none"; }, 5000);
}

function showGitHubTabs(show) {
  document.querySelectorAll(".gh-tab").forEach(t => { t.style.display = show ? "" : "none"; });
}

(async () => {
  document.getElementById("app").style.display = "";
  await detectGitDir();
  loadGitGraph();
  loadChanges();
  // Load GitHub config — show GitHub tabs only if token + repo available
  const ok = await loadConfig();
  showGitHubTabs(ok);
})();

setInterval(() => {
  const gitTab = document.getElementById("tab-git");
  if (gitTab && gitTab.classList.contains("active") && gitDir) loadChanges();
}, 2000);
